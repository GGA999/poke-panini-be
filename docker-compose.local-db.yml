services:
  db:
    image: postgres:16-alpine
    container_name: poke-panini-db
    environment:
      POSTGRES_DB: poke_panini
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '54322:5432'
    volumes:
      - poke_panini_pgdata:/var/lib/postgresql/data
      - .:/workspace:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d poke_panini']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  poke_panini_pgdata:
